<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>회원 목록</h1>
    <button id="loadBtn">회원 불러오기</button>
    <div id="result"></div>
    <hr>
    <h1>회원 추가하기</h1>
    <input id="name" placeholder="이름 입력">
    <input id="email" placeholder="이메일 입력">
    <button id="saveBtn">회원 등록</button>

    <div id="result2"></div>



    <script>
        let btn = document.getElementById("loadBtn");
        let result = document.getElementById("result");
        let result2 = document.getElementById("result2");

        

        const saveBtn = document.getElementById("saveBtn");

        saveBtn.addEventListener("click",async ()=> {
            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;

            //둘 중 하나라도 입력하지 않았을 때
            //"모든 항목을 입력하세요" 경고 띄우기
            if(name === '' || email === ''){
                alert("모든 항목을 입력하세요");
                return;
            }

            //내가 입력한 정보를 서버에 추가해달라고 요청
            fetch("https://jsonplaceholder.typicode.com/users",{
                method : "POST", //HTTP 전송방식
                headers : { //서버에게 내가 보내는 데이터는 JSON 형식입니다.
                    "Content-Type":"application/json"
                },
                //전달하고자 하는 내용
                body : JSON.stringify({ 
                    name : name,
                    email : email
                })
            })
            .then(response => response.json())
            .then(data => {
                //내가 추가한 사람의 이름과 이메일 div에 넣기
                result2.innerHTML = `
                    <h3> 등록 결과 </h3>
                    <p> ID : ${data.id}</p>
                    <p> email : ${data.email}</p>
                `;
            })








        })

        btn.addEventListener("click",() => {
            //응답이 도착한 후 실행할 코드를 따로 설정해야 한다.
            fetch("https://jsonplaceholder.typicode.com/users")
            .then(response => response.json())//앞의 비동기 작업이 끝난 뒤 실행할 코드를 작성하는 메서드
            //json()은 서버 응답을 Javascipt 객체나 배열로 바꿔준다.
            //status 연결 상태코드
            //headers 연결 정보
            //body : 데이터
            .then(users => {
                let html = "";
                for(let user of users){
                    html += `
                        <div>
                            <p>이름 : ${user.name}</p>
                            <p>이메일 : ${user.email}</p>
                            <hr>
                        </div>
                    `;
                }
                result.innerHTML = html;
            })
        })
        // 통신
        // 브라우저와 서버가 데이터를 주고받는 것

        //동기통신
        //작업이 끝날때까지 기다리는 방식
        //앞의 코드가 끝나야 다음 코드가 실행이 된다.

        //비동기통신
        //기다리지 않고 다음 작업을 먼저 수행하는 방식

        //왜 필요한가?
        //웹에서는 서버 응답이 오래걸릴 수 있다.

        // console.log("1");

        // //setTimeout() : 대표적인 비동기함수
        // setTimeout(() => {
        //     console.log("2");
        // },2000);

        // console.log("3");

        //fetch api
        //fetch()함수의 사용
        //서버에 요청을 보내는 함수
        //fetch(요청할 주소);
        //비동기 함수이기 때문에 서버 응답을 기다리지 않고 다음코드를 실행한다.

        console.log("1. 요청시작");
        

        console.log("2. 요청 후 코드 실행")

        //async / await
        // async : 함수를 비동기로 만드는 키워들
        // await : 비동기 작업이 끝날 때까지 기다렸다가 다음 줄을 실행하세요
        const hello = async () => {
            const response = await fetch("url");
            const data = await response.json();
            console.log(data);
        };

        

    </script>
</body>
</html>
