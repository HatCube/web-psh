<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button{
            /* 가로세로 지정 */
            width : 100px;
            height : 100px;
            /* 글자 스타일 */
            background-color : cornflowerblue;
            color : white;
            font-size : 24px;
            /* 테두리 */
            border : 1px solid black;
            border-radius : 50%;
            cursor : pointer;
        }
    </style>
</head>
<body>
    <!-- HTML에서 버튼을 만드는 방법 -->

    <!-- 1. <button> 태그 -->
    <button>
        <strong>클릭하세요</strong>
    </button>

    <!-- input태그의 type속성을 button으로 주기
     종료 태그가 없다.
     글자는 value속성으로 지정
     html 태그 삽입이 불가능하다. -->
    <input type="button" value="input 버튼">
</body>
</html>
