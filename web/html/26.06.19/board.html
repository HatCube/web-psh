<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin : 0;
            padding : 0;
            box-sizing : border-box;
        }

        body{
            background-color : #f5f6f8;
            font-family : sans-serif;
            padding : 40px;
        }

        /* 컨테이너 */
        .board-container{
            max-width: 900px;
            margin:0 auto;
            background-color : white;
            border : 1px solid #ddd;
            border-radius : 8px;
        }

        .board-header{
            display:flex;
            justify-content: space-between;
            padding : 20px 24px;
            align-items : center;
            border-bottom : 2px solid #2d6a4f;
        }

        .header-actions{
            display:flex;
            gap : 8px;
        }

        .search-box{
            padding : 8px 12px;
            border : 1px sold #ccc;
            border-radius : 4px;
            width : 200px;
        }

        .write-btn{
            padding : 8px 16px;
            background : #2d6a4f;
            color : white;
            border : none;
            border-radius : 4px;
            cursor : pointer;
        }

        /* 테이블 스타일 */
        .board-table{
            width : 100%;
            border-collapse : collapse;
        }

        .board-table tr{
            display:flex;
        }

        .board-table th{
            background-color : #f1f3f5;
            font-size : 14px;
            padding : 12px;
            border-bottom : 1px solid #ddd;
            text-align:center;
        }

        .no-cell{
            flex: 1
        }

        .board-table .title-cell{
            text-align : left;
            flex: 3;
        }

        .author-cell{
            flex:1;
        }

        .date-cell{
            flex:1;
        }

        .views-cell{
            flex:1;
        }

        .board-table td{
            font-size : 14px;
            padding : 14px 12px;
            border-bottom: 1px solid #eee;
            text-align : center;
            
        }

        .board-table a{
            color : #222;
            text-decoration:none;
        }

        .pagination{
            display : flex;
            justify-content: center;
            align-items: center;
            gap : 6px;

            padding : 20px 24px;
        }

        .page-btn{
            padding : 6px 12px;
            border : 1px solid #ddd;
            background : white;
            font-size : 13px;
            border-radius : 4px;
        }

        .active{
            background-color : #2d6a4f;
            color : white;
            border : 1px solid #2d6a4f;
        }
    </style>
</head>
<body>
    <div class="board-container">
        <header class="board-header">
            <h1 class="board-title">자유게시판</h1>

            <div class="header-actions">
                <input type="text" class="search-box" placeholder="제목을 검색하세요">
                <button class="write-btn">글쓰기</button>
            </div>
        </header>
        <table class="board-table">
                <thead>
                    <tr>
                        <th class="no-cell">번호</th>
                        <th class="title-cell">제목</th>
                        <th class="author-cell">작성자</th>
                        <th class="date-cell">작성일</th>
                        <th class="views-cell">조회수</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td class="no-cell">5</td>
                        <td class="title-cell"><a href="#">도서관 휴관 안내(6월25일)</a></td>
                        <td class="author-cell">관리자</td>
                        <td class="date-cell">2026-06-18</td>
                        <td class="views-cell">128</td>
                    </tr>
                    <tr>
                        <td class="no-cell">5</td>
                        <td class="title-cell"><a href="#">도서관 휴관 안내(6월25일)</a></td>
                        <td class="author-cell">관리자</td>
                        <td class="date-cell">2026-06-18</td>
                        <td class="views-cell">128</td>
                    </tr>
                    <tr>
                        <td class="no-cell">5</td>
                        <td class="title-cell"><a href="#">도서관 휴관 안내(6월25일)</a></td>
                        <td class="author-cell">관리자</td>
                        <td class="date-cell">2026-06-18</td>
                        <td class="views-cell">128</td>
                    </tr>
                    <tr>
                        <td class="no-cell">5</td>
                        <td class="title-cell"><a href="#">도서관 휴관 안내(6월25일)</a></td>
                        <td class="author-cell">관리자</td>
                        <td class="date-cell">2026-06-18</td>
                        <td class="views-cell">128</td>
                    </tr>
                    <tr>
                        <td class="no-cell">5</td>
                        <td class="title-cell"><a href="#">도서관 휴관 안내(6월25일)</a></td>
                        <td class="author-cell">관리자</td>
                        <td class="date-cell">2026-06-18</td>
                        <td class="views-cell">128</td>
                    </tr>
                </tbody>
        </table>

        <div class="pagination">
            <button class="page-btn">이전</button>
            <button class="page-btn active">1</button>
            <button class="page-btn">2</button>
            <button class="page-btn">3</button>
            <button class="page-btn">4</button>
            <button class="page-btn">5</button>
            <button class="page-btn">다음</button>
        </div>
    </div>
</body>
</html>
