<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <link rel='stylesheet' href='main.css'>

    <style>

        .container1{
            display: flex;
            gap : 10px;
        }

        .container2{
            display: flex;
            flex-direction: column;
            gap : 10px;
            height : 100vh;
        }

        aside{
            width : 200px;
            background: skyblue;
            border: 1px solid black;
        }

        .main1{
            border: 1px solid black;
            /*남은 공간 전체를 main에게 할당하고 싶다.*/
            width : calc(100% - 200px);
        }

        header{
            height: 80px;
            background: cornflowerblue;
            border : 1px solid black;
        }

        .main2{
            background: orange;
            height : calc(100% - 80px);
            /*100%로 하면 부모의 높이를 따라가는데*/
            border : 1px solid black;
        }
    </style>
</head>
<body>
    <!--calc() 함수
    CSS에서 값을 직접 계산해서 사용하는 함수
    사칙연산을 이용하여 길이나 크기를 계산할 수 있다.
    "전체화면에서 100px만 빼고싶다" 고정크기(px)와 비율(%)을 함께 계산할 수 있다.
    
    브라우저 전체 너비가 1000px이고 왼쪽 메뉴가 250px이면 남은공간은 750px이다.
    브라우저의 크기가 바뀌면 직접 바꿔줄 수 없으니 CSS에게 계산을 맡긴다.
    calc(100%-250px)-->

    <div class = "container1">
        <aside>메뉴</aside>
        <main class = "main1">본문</main>
    </div>
    <hr>
    <div class = "container2">
        <header>헤더</header>
        <main class = "main2">본문</main>
    </div>
</body>
</html>
