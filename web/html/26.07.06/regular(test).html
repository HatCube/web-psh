<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            box-sizing: border-box;
        }

        body{
            margin : 0;
            font-family: Arial,sans-serif;
            background : #f1f5f9;
        }

        .container{
            width : 420px;
            margin : 60px auto;
            padding : 30px;
            background : white;
            border-radius : 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.12);
        }

        h1{
            text-align : center;
            margin-bottom : 25px;
            font-size : 26px;
        }

        .form-group{
            margin-bottom : 18px;
        }

        label{
            display : block;
            margin-bottom : 7px;
            font-weight : bold;
        }

        input{
            width : 100%;
            padding : 12px;
            border : 1px solid #cbd5e1;
            font-size : 15px;
        }

        input:focus{
            outline:none;
            border-color : #2563eb;
        }

        .message{
            margin-top : 6px;
            font-size : 13px;
        }

        .success{
            color : green;
        }

        .error{
            color : red;
        }

        button{
            width : 100%;
            padding : 13px;
            border : none;
            border-radius : 8px;
            background : #2563eb;
            color : white;
            font-size : 16px;
            cursor : pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>회원가입</h1>
        <div class="form-group">
            <label for="userId">아이디</label>
            <input id="userId" placeholder="영문 소문자+숫자 5 ~12자">
            <p id="idMsg" class="message"></p>
        </div>

        <div class="form-group">
            <label for="userPw">비밀번호</label>
            <input id="userPw" placeholder="영문+숫자+특수문 8~16자">
            <p id="pwMsg" class="message"></p>
        </div>

        <div class="form-group">
            <label for="email">이메일</label>
            <input id="email" placeholder="example@test.com">
            <p id="emailMsg" class="message"></p>
        </div>

        <div class="form-group">
            <label for="userName">비밀번호</label>
            <input id="userName" placeholder="한글 2~5자">
            <p id="nameMsg" class="message"></p>
        </div>

        <button id="signup">가입하기</button>

    </div>

    <script>
        //입력태그 등록하기
        let userId = document.getElementById("userId");
        let userPw = document.getElementById("userPw");
        let email = document.getElementById("email");
        let userName = document.getElementById("userName");

        //메시지 나오는 태그
        let idMsg = document.getElementById("idMsg");
        let pwMsg = document.getElementById("pwMsg");
        let emailMsg = document.getElementById("emailMsg");
        let nameMsg = document.getElementById("nameMsg");

        //정규식
        let idRegex = /^[a-z0-9]{5,12}$/;
        let pwRegex = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[!@#$%^&*])[A-Za-z0-9!@#$%^&*]{8,16}$/;
        let emailRegex = /^[A-Za-z\d._%+-]+@[A-Za-z\d._%+-]+\.[A-Za-z]{2,}$/;
        let nameRegex = /^[가-힣]{2,5}$/;

        //입력한 아이디 검사
        userId.addEventListener("input",() => {
            checkInput(
                idRegex,
                userId.value,
                idMsg,
                "사용가능한 아이디입니다.",
                "아이디는 영어 소문자와 숫자만 사용하여 5~12자로 입력하세요")
        })

        userPw.addEventListener("input",() => {
            checkInput(
                pwRegex,
                userPw.value,
                pwMsg,
                "사용가능한 비밀번호입니다.",
                "비밀번호는 영문, 숫자, 특수문자를 포함하여 8~16자로 입력하세요")
        })

        email.addEventListener("input",() => {
            checkInput(
                emailRegex,
                email.value,
                emailMsg,
                "사용가능한 이메일입니다.",
                "이메일 형식이 올바르지 않습니다.")
        })

        userName.addEventListener("input",() => {
            checkInput(
                nameRegex,
                userName.value,
                nameMsg,
                "올바른 이름입니다.",
                "이름은 한글 2~5자로 입력해주세요")
        })

        //검사하는 함수
        function checkInput(
            regex, //정규식
            value, //값
            msgElement, //메시지 출력할 태그 
            successText, //성공 메시지
            errorText //에러메시지
        ){
            if(value.trim() === ""){
                msgElement.innerText = "";
                msgElement.className = "message";
            } 

            if(regex.test(value)){
                msgElement.innerText = successText;
                msgElement.className = "message success";
            } else {
                msgElement.innerText = errorText;
                msgElement.className = "message error";
            }
        }
    </script>
</body>
</html>
