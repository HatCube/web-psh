<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <link rel='stylesheet' href='main.css'>
    <style>
        html{
            background-color: #f5f5f5;
            font-family: Arial;
        }

        h1{
            color : navy;
            font-size: 30px;

        }

        .register{
            border : 2px solid black;
            background-color: white;
        }

        table {
            border: 2px solid black;
            background-color: white;
        }

        tr{
            border: 1px solid gray;
        }

        #tabletitle{
            background-color: #dddddd;
        }
    </style>

</head>
<body>
    <h1>수강생 관리 화면</h1>

    <div class = "register">
        <h2>수강생 등록</h2>
        이름 <input placeholder="이름을 입력하세요">
        과정 선택<select name = "title">
            <option>HTML 기초</option>
            <option>CSS 기초</option>
            <option>화면 설계</option>
        </select>
        <input type="button" value="등록">
    </div>

    <h2>수강생 목록</h2>
    <table border="1" >
        <tr align="center" id="tabletitle">
           
            <td><strong>번호</strong></td>
           <td><strong>이름</strong></td>
           <td><strong>과정명</strong></td>
           <td><strong>출석 상태</strong></td>
           
        </tr>

        <tr align="center">
           <td>1</td>
           <td>김학생</td>
           <td>HTML 기초</td>
           <td>출석</td>
        </tr>

        <tr align="center">
           <td>2</td>
           <td>이학생</td>
           <td>CSS 기초</td>
           <td>지각</td>
        </tr>

        <tr align="center">
           <td>3</td>
           <td>박학생</td>
           <td>화면 설계</td>
           <td>결석</td>
        </tr>

    </table>
</body>
</html>
