<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin : 0;
            padding : 0;
        }

        body{
            background-color : #f5f6f8;
            padding : 40px 20px;
        }
        .gallery-container{
            width: 1000px;
            margin : 0 auto;
        }

        .gallery-container h1{
            text-align : center;
            font-size : 28px;
            color : #222;
            margin-bottom : 30px;
        }

        .card-list{
            display:flex;
            gap : 20px;
            justify-content: center;
        }

        .card{
            width : 300px;
            background: #fff;
            border : 1px solid #ddd;
            padding : 16px;
        }

        .card img{
            width : 100%;
        }

        .card h2{
            font-size : 18px;
            color : #222;
            margin-top : 10px;
        }

        .card p{
            font-size : 14px;
            color : #666;
            line-height : 1.5;
            margin-top : 10px;
        }

        .card button{
            background-color: #2d6a4f;
            color : #fff;
            border : 1px solid #2d6a4f;
            padding : 8px 16px;
            border-radius : 4px;
            margin-top : 10px;
        }
    </style>
</head>
<body>
    <div class="gallery-container">
        <h1>갤러리</h1>

        <!-- 카드 목록을 감싸는 div -->
        <div class="card-list">
            <div class="card">
                <img src="../img/dog.jpg">
                <h2>여름 바다</h2>
                <p>시원하고 푸른 여름 바다입니다.</p>
                <button>자세히 보기</button>
            </div>

            <div class="card">

                <button>자세히 보기</button>
            </div>

            <div class="card">

                <p>시원하고 푸른 여름 바다입니다.</p>
                <button>자세히 보기</button>
            </div>
        </div>
    </div>
</body>
</html>
