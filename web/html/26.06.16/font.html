<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <link rel='stylesheet' href='main.css'>
    <style>
        /*텍스트 관련 스타일
        font-size : 글자의 크기를 정하는 속성
        font-weight : 글자의 굵기를 지정하는 속성
        font-style : 글자의 기울임 형태를 지정하는 속성
        font-family : 글꼴을 지정
        font : 스타일 두께 사이즈 family */
        .a1{font-size: 30px;}
        .a2{font-style: italic;}
        .a3{font-weight: 700;}
        .a4{font-family: "궁서","굴림",sans-serif;}
        .a5{font : bold italic 30px "궁서","돋움",sans-serif;}
    </style>
</head>
<body>
    <p class = "a1">글자 크기</p>
    <p class = "a2">글자 스타일</p>
    <p class = "a3">글자 두께</p>
    <p class = "a4">글꼴 변경</p>
    <p class = "a5">폰트 축약</p>
</body>
</html>
