<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <link rel='stylesheet' href='github.css'>
    <script src="github.js" defer></script>
</head>
<body>
    <div class = "container" id = "container">
        <h1>Github 사용자 프로필 검색</h1>
        <div class = "searchBar">
            <input type="text" id="insertName" placeholder="GitHub 아이디 입력">
            <button type="button" id = "btn">검색</button>
        </div>
        <p class = "msg" id = "msg"></p>

        <div class = "info">
            <img src="" alt="프로필이미지" id = "avatar_url">
            <p id = "login"></p>
            <p id = "name"></p>
            <p id = "blog"></p>
            <span id = "followers"></span>
            <span id = "folloing"></span>
            <span id = "public_repos"></span>
        </div>
    </div>
    
    
</body>
</html>
