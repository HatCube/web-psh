<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .product-card{
            border : 1px solid #eee;
            border-radius : 8px;
            padding : 16px;
            width : 200px;
            background-color: #fff;
            margin-bottom : 20px;
            display : inline-block;
        }

        /* block에 종속된 하위 요소들 */
        .product-card__image{
            width : 100%;
            height : 150px;
            object-fit : cover;
            background-color: #eee;
            display : flex;
            justify-content: center;
            align-items: center;
            font-size : 12px;
            color : #aaa;
        }

        .product-card__title{
            font-size : 18px;
            font-weight : bold;
            margin: 10px 0;
        }

        .product-card__price{
            color : #e74c3c;
        }

        /* modifier */
        .product-card--soldout{
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>
    <div class="product-card">
        <div class="product-card__image">IMAGE</div>
        <div class="product-card__title">기본 후드티</div>
        <div class="product-card__price">39,000원</div>
    </div>
    <div class="product-card product-card--soldout">
        <div class="product-card__image">IMAGE</div>
        <div class="product-card__title">레이어드 맨투맨[품절]</div>
        <div class="product-card__price">29,000원</div>
    </div>
</body>
</html>
