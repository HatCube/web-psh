<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <link rel='stylesheet' href='main.css'>
</head>
<body>
    <p><b>단락</b>을 구별하는 <strong>태그</strong>는 p태그이다.</p>
    <p>
        <!-- 태그 텍스트 기울이기-->
        <i>링크 태그 </i>
        <em>링크 태그 2</em>
    </p>
    <p>
        <!--Mark 태그 글씨가 강조된다.-->
        HTML <Mark>Marked</Mark> Formatting
    </p>
    <p>
        <!-- del 태그 취소선-->
         My favorite color is <del>black</del> red.
    </p>
    <p>
        <!--small 태그 글씨가 작게 나온다-->
        HTML <small>Small</small> Formatting
    </p>
    <p>
        <!--sub 태그 글이 아래로 나온다.-->
        This is <sub>subscripted</sub> text
    </p>
        <!--sup 태그 글이 위로 나온다.-->
        This is <sup>supscripted</sup> text
</body>
</html>
