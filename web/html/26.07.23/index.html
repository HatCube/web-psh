<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>반려동물 진료 예약 관리</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>반려동물 진료 예약 관리</h1>


        <!-- ====================================== -->
        <!-- 예약 등록 및 수정 영역 -->
        <!-- ====================================== -->

        <div class="form-area">

            <h2>예약 등록</h2>

            <!-- 수정할 때 사용할 예약 번호 -->
            <input
                type="hidden"
                id="reservationId">


            <label>반려동물 이름</label>

            <input
                type="text"
                id="petName"
                placeholder="반려동물 이름">


            <label>보호자 이름</label>

            <input
                type="text"
                id="ownerName"
                placeholder="보호자 이름">


            <label>동물 종류</label>

            <select id="animalType">

                <option value="">
                    선택
                </option>

                <option value="강아지">
                    강아지
                </option>

                <option value="고양이">
                    고양이
                </option>

                <option value="햄스터">
                    햄스터
                </option>

                <option value="기타">
                    기타
                </option>

            </select>


            <label>담당 수의사</label>

            <input
                type="text"
                id="doctorName"
                placeholder="담당 수의사">


            <label>예약 날짜</label>

            <input
                type="date"
                id="reservationDate">


            <label>예약 상태</label>

            <select id="status">

                <option value="예약">
                    예약
                </option>

                <option value="진료완료">
                    진료완료
                </option>

                <option value="예약취소">
                    예약취소
                </option>

            </select>


            <label>예상 진료비</label>

            <input
                type="number"
                id="price"
                placeholder="예상 진료비">


            <div class="button-area">

                <button
                    id="saveBtn">
                    등록
                </button>

                <button
                    id="cancelBtn"
                    type="button">
                    취소
                </button>

            </div>

        </div>



        <!-- ====================================== -->
        <!-- 예약 목록 -->
        <!-- ====================================== -->

        <div class="list-area">

            <div class="list-header">

                <h2>예약 목록</h2>

                <button id="loadBtn">
                    전체 조회
                </button>

            </div>


            <table>
                <thead>
                    <tr>
                        <th>번호</th>
                        <th>반려동물</th>
                        <th>보호자</th>
                        <th>동물 종류</th>
                        <th>수의사</th>
                        <th>예약 날짜</th>
                        <th>상태</th>
                        <th>진료비</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody id="reservationList">

                </tbody>
            </table>
        </div>

    </div>


    <script src="app.js"></script>

</body>

</html>
